[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Все GIF зашиваются в прошивку как массивы байт и вместе с кодом
; не влезают в дефолтный OTA-партишн (2x ~3.2MB из default_8MB.csv).
; OTA не используется, поэтому отдаём под приложение почти всю 8MB flash.
board_build.partitions = max_app_8MB.csv
board_build.flash_size = 8MB

lib_deps =
    lovyan03/LovyanGFX@^1.1.12
    bitbank2/AnimatedGIF@^2.1.1

monitor_speed = 115200
upload_speed = 460800
