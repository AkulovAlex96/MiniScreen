[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Включаем 8МБ octal PSRAM (чип S3 R8): фреймбуфер уходит туда,
; heap остаётся для TLS-хендшейков (им нужно ~50КБ разом).
; Если после прошивки бут-луп — заменить qio_opi на dio_opi.
board_build.arduino.memory_type = qio_opi
build_flags = -DBOARD_HAS_PSRAM

lib_deps =
    lovyan03/LovyanGFX@^1.1.12
    bblanchon/ArduinoJson@^7
    bitbank2/PNGdec@^1.1.6

monitor_speed = 115200
upload_speed = 460800
